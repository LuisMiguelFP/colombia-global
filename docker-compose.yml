version: '3.8'
services:
  web:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - ollama
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: serve

volumes:
  ollama_data:
